services:
  zai2api:
    image: ${ZAI2API_IMAGE:-ghcr.io/orbitoo/zai2api:latest}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "${BIND_HOST:-127.0.0.1}:${HOST_PORT:-8000}:8000"
    volumes:
      - type: bind
        source: ${DATA_DIR:-./data}
        target: /app/data
