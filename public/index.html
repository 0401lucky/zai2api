<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>zai2api 控制台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">Z</div>
          <div>
            <div class="eyebrow">Cloudflare Native</div>
            <h1>zai2api 控制台</h1>
          </div>
        </div>
        <p class="sidebar-copy">
          面向长期部署的账号代理后台。管理 JWT、账号池、安全设置与运行日志。
        </p>
        <div class="status-card" id="summary-card">
          <div class="status-label">状态</div>
          <div class="status-value" id="summary-text">正在读取启动信息…</div>
        </div>
        <nav class="nav">
          <button class="nav-button active" data-view="accounts">账号</button>
          <button class="nav-button" data-view="security">安全</button>
          <button class="nav-button" data-view="logs">日志</button>
        </nav>
        <button class="ghost danger" id="logout-button" hidden>退出后台</button>
      </aside>

      <main class="content">
        <section class="hero">
          <div>
            <div class="eyebrow">Workers / D1 / Assets</div>
            <h2 id="hero-title">准备中</h2>
            <p id="hero-copy">正在从服务端读取后台状态。</p>
          </div>
          <div class="hero-meta">
            <span class="meta-pill" id="panel-source-pill">面板密码</span>
            <span class="meta-pill" id="api-source-pill">API 密码</span>
          </div>
        </section>

        <section class="panel auth-panel" id="setup-panel" hidden>
          <div class="panel-header">
            <div>
              <div class="eyebrow">首次初始化</div>
              <h3>设置后台密码</h3>
            </div>
          </div>
          <form id="setup-form" class="form-grid">
            <label>
              <span>初始化令牌</span>
              <input type="password" name="setup_token" placeholder="输入部署时生成的 SETUP_TOKEN" required />
            </label>
            <label>
              <span>后台密码</span>
              <input type="password" name="panel_password" placeholder="至少输入一组后台密码" required />
            </label>
            <label>
              <span>API 密码（可选）</span>
              <input type="password" name="api_password" placeholder="不填则默认关闭 API 密码" />
            </label>
            <label>
              <span>日志保留天数</span>
              <input type="number" name="log_retention_days" min="1" value="7" />
            </label>
            <button class="primary" type="submit">初始化后台</button>
          </form>
        </section>

        <section class="panel auth-panel" id="login-panel" hidden>
          <div class="panel-header">
            <div>
              <div class="eyebrow">后台登录</div>
              <h3>进入管理台</h3>
            </div>
          </div>
          <form id="login-form" class="form-inline">
            <input type="password" name="password" placeholder="输入后台密码" required />
            <button class="primary" type="submit">登录</button>
          </form>
        </section>

        <section class="view-stack" id="view-stack" hidden>
          <section class="panel view-panel" data-view-panel="accounts">
            <div class="panel-header">
              <div>
                <div class="eyebrow">账号池</div>
                <h3>添加与切换账号</h3>
              </div>
              <button class="ghost" id="reload-accounts">刷新账号</button>
            </div>
            <form id="account-form" class="form-inline wide">
              <input type="text" name="jwt" placeholder="粘贴完整 JWT" required />
              <button class="primary" type="submit">校验并保存</button>
            </form>
            <div class="account-grid" id="accounts-grid"></div>
          </section>

          <section class="panel view-panel" data-view-panel="security" hidden>
            <div class="panel-header">
              <div>
                <div class="eyebrow">安全设置</div>
                <h3>密码与保留策略</h3>
              </div>
            </div>
            <form id="security-form" class="form-grid">
              <label>
                <span>更新后台密码</span>
                <input type="password" name="panel_password" placeholder="留空表示不修改" />
              </label>
              <label>
                <span>更新 API 密码</span>
                <input type="password" name="api_password" placeholder="留空表示不修改" />
              </label>
              <label class="checkbox-row">
                <input type="checkbox" name="disable_api_password" />
                <span>关闭 API 密码</span>
              </label>
              <label>
                <span>日志保留天数</span>
                <input type="number" name="log_retention_days" min="1" value="7" />
              </label>
              <button class="primary" type="submit">保存安全设置</button>
            </form>
          </section>

          <section class="panel view-panel" data-view-panel="logs" hidden>
            <div class="panel-header">
              <div>
                <div class="eyebrow">运行日志</div>
                <h3>最近 50 条</h3>
              </div>
              <button class="ghost" id="reload-logs">刷新日志</button>
            </div>
            <div class="log-list" id="logs-list"></div>
          </section>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" hidden></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
